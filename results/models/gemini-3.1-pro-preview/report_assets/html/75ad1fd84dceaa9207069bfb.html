        function meshToThreeJs(mesh, color, isWireframe, meshSuffix) {
            const vertices = mesh.vertices;
            const faces = mesh.faces;
            
            const verts = [];
            for (const v of vertices) {
                verts.push(v[0], v[1], v[2]);

                const edges = new Set();
